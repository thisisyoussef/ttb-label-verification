<!-- Results - No Text Extracted -->
<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Results - No Text Extracted (Recovery State) | Industrial Compliance</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700;800&amp;family=Work+Sans:wght@400;500;600&amp;family=Inter:wght@400;600;700&amp;family=IBM+Plex+Mono&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
</head>
<body class="bg-background text-on-surface antialiased">
<!-- Context Pin (Thumbnail Area) -->
<div class="mb-8 flex items-start gap-6">
<div class="w-48 h-32 rounded-lg overflow-hidden bg-surface-container-low shadow-sm ring-1 ring-outline-variant/20 relative">
<div class="w-full h-full flex items-center justify-center bg-black/20 text-white">
<span class="material-symbols-outlined">zoom_in</span>
</div>
</div>
<div class="flex-1">
<h1 class="text-2xl font-extrabold text-on-surface mb-2">Extraction Results</h1>
</div>
</div>

<!-- Advisory Band (Neutral / Recovery State) -->
<div class="bg-surface-container-low p-8 rounded-lg mb-8 border-l-4 border-secondary shadow-sm">
<div class="flex gap-6">
<div class="p-3 bg-white rounded-lg shadow-sm h-fit">
<span class="material-symbols-outlined text-secondary text-3xl">scan_delete</span>
</div>
<div class="flex-1">
<h2 class="text-xl font-bold text-on-surface mb-2">We couldn't read enough text from this image.</h2>
<p class="text-on-surface-variant max-w-2xl leading-relaxed">
The photo may be too blurry, too dark, or cropped. Your inputs are still here — nothing was saved. Please choose how you would like to proceed with this audit entry.
</p>
<div class="mt-8 grid grid-cols-1 md:grid-cols-2 gap-4 max-w-2xl">
<button class="flex flex-col items-start p-4 bg-white rounded-lg border border-transparent">
<div class="flex items-center justify-between w-full mb-3">
<span class="material-symbols-outlined text-primary">add_a_photo</span>
<span class="material-symbols-outlined text-outline-variant text-sm">arrow_forward</span>
</div>
<span class="font-bold text-on-surface">Try another image</span>
<span class="text-xs text-on-surface-variant mt-1">Clears the current file and returns to capture field.</span>
</button>
<button class="flex flex-col items-start p-4 bg-white rounded-lg border border-transparent">
<div class="flex items-center justify-between w-full mb-3">
<span class="material-symbols-outlined text-secondary">edit_note</span>
<span class="material-symbols-outlined text-outline-variant text-sm">arrow_forward</span>
</div>
<span class="font-bold text-on-surface">Continue with caution</span>
<span class="text-xs text-on-surface-variant mt-1">Render partial evidence and input data manually.</span>
</button>
</div>
</div>
</div>
</div>
</body></html>
