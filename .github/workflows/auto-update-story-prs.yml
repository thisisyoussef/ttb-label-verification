name: auto-update-story-prs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-open-story-prs:
    runs-on: ubuntu-latest

    steps:
      - name: Update eligible story branches that are behind main
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branchPattern = /^(claude|codex|chore)\/TTB(?:-[A-Z]+)?-[0-9]+(?:-.+)?$/;

            const pulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              base: 'main',
              per_page: 100,
            });

            for (const pr of pulls) {
              if (pr.draft) {
                core.info(`Skipping draft PR #${pr.number}.`);
                continue;
              }

              if (pr.head.repo?.full_name !== `${owner}/${repo}`) {
                core.info(`Skipping fork PR #${pr.number}.`);
                continue;
              }

              if (!branchPattern.test(pr.head.ref)) {
                core.info(`Skipping non-story branch ${pr.head.ref} on PR #${pr.number}.`);
                continue;
              }

              const details = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: pr.number,
              });

              if (details.data.mergeable_state !== 'behind') {
                core.info(
                  `PR #${pr.number} is ${details.data.mergeable_state ?? 'not-ready'}; no branch update needed.`,
                );
                continue;
              }

              try {
                await github.rest.pulls.updateBranch({
                  owner,
                  repo,
                  pull_number: pr.number,
                  expected_head_sha: pr.head.sha,
                });
                core.notice(`Queued branch update for PR #${pr.number}.`);
              } catch (error) {
                core.warning(
                  `Could not update PR #${pr.number}: ${error instanceof Error ? error.message : String(error)}`,
                );
              }
            }
