name: auto-open-story-prs

on:
  push:
    branches:
      - "claude/**"
      - "codex/**"
      - "chore/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  open-draft-story-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Open draft PR when a story branch is first published
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const path = require('node:path');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = context.ref.replace('refs/heads/', '');
            const storyBranchPattern = /^(claude|codex|chore)\/TTB(?:-[A-Z]+)*-[0-9]+(?:-.+)?$/;

            if (!storyBranchPattern.test(branch)) {
              core.notice(`Skipping auto-open: '${branch}' is not a story branch.`);
              return;
            }

            const existingPulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              head: `${owner}:${branch}`,
              base: 'main',
              per_page: 100,
            });

            if (existingPulls.length > 0) {
              core.notice(
                `Skipping auto-open: PR #${existingPulls[0].number} already exists for '${branch}'.`,
              );
              return;
            }

            const templatePath = path.join(
              process.env.GITHUB_WORKSPACE,
              '.github',
              'pull_request_template.md',
            );
            const body = fs.readFileSync(templatePath, 'utf8');
            const commitMessage = context.payload.head_commit?.message ?? branch;
            const title = commitMessage.split('\n')[0].slice(0, 240);

            try {
              const { data: pull } = await github.rest.pulls.create({
                owner,
                repo,
                head: branch,
                base: 'main',
                title,
                body,
                draft: true,
              });

              core.notice(`Opened draft PR #${pull.number} for '${branch}'.`);
            } catch (error) {
              if (
                error.status === 422 &&
                /pull request/i.test(error.message) &&
                /already exists/i.test(error.message)
              ) {
                core.notice(`PR already exists for '${branch}'.`);
                return;
              }

              throw error;
            }
