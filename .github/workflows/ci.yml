name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - production

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Run golden LLM evals
        env:
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          LANGSMITH_PROJECT: ttb-label-verification-dev
        run: |
          if [ -n "${LANGSMITH_API_KEY:-}" ]; then
            export LANGSMITH_TRACING=true
            export LANGSMITH_TEST_TRACKING=true
          else
            export LANGSMITH_TRACING=false
            export LANGSMITH_TEST_TRACKING=false
          fi
          npm run eval:golden

      - name: Run typecheck
        run: npm run typecheck

      - name: Build application
        run: npm run build
