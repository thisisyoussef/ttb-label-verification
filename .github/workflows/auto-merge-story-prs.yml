name: auto-merge-story-prs

on:
  workflow_run:
    workflows:
      - ci
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  merge-eligible-story-prs:
    if: ${{ github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Rebase-merge eligible story PRs after green CI
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const run = context.payload.workflow_run;
            const branchPattern = /^(claude|codex|chore)\/TTB(?:-[A-Z]+)?-[0-9]+(?:-.+)?$/;

            async function readPull(pullNumber) {
              const { data } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: pullNumber,
              });
              return data;
            }

            async function waitForMergeableState(pullNumber) {
              for (let attempt = 0; attempt < 5; attempt += 1) {
                const pull = await readPull(pullNumber);
                if (pull.mergeable_state !== null) {
                  return pull;
                }

                await new Promise((resolve) => setTimeout(resolve, 2000));
              }

              return readPull(pullNumber);
            }

            for (const prRef of run.pull_requests ?? []) {
              const pull = await waitForMergeableState(prRef.number);

              if (pull.state !== 'open' || pull.draft) {
                core.info(`Skipping PR #${pull.number} because it is not merge-ready.`);
                continue;
              }

              if (pull.base.ref !== 'main') {
                core.info(`Skipping PR #${pull.number} because it does not target main.`);
                continue;
              }

              if (pull.head.repo?.full_name !== `${owner}/${repo}`) {
                core.info(`Skipping fork PR #${pull.number}.`);
                continue;
              }

              if (!branchPattern.test(pull.head.ref)) {
                core.info(`Skipping non-story branch ${pull.head.ref} on PR #${pull.number}.`);
                continue;
              }

              if (pull.head.sha !== run.head_sha) {
                core.info(`Skipping PR #${pull.number} because CI ran on an older head SHA.`);
                continue;
              }

              if (pull.mergeable_state !== 'clean') {
                core.info(
                  `Skipping PR #${pull.number} because mergeable_state is '${pull.mergeable_state ?? 'unknown'}'.`,
                );
                continue;
              }

              try {
                await github.rest.pulls.merge({
                  owner,
                  repo,
                  pull_number: pull.number,
                  merge_method: 'rebase',
                });
                core.notice(`Rebase-merged PR #${pull.number}.`);
              } catch (error) {
                core.warning(
                  `Could not merge PR #${pull.number}: ${error instanceof Error ? error.message : String(error)}`,
                );
              }
            }
