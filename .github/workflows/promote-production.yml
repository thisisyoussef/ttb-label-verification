name: promote-production

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Branch or tag to promote to the production branch
        required: true
        default: main

permissions:
  actions: write
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Promote source ref to production branch
        env:
          SOURCE_REF: ${{ github.event.inputs.source_ref }}
        run: |
          set -euo pipefail
          git fetch origin "$SOURCE_REF"
          git checkout --detach FETCH_HEAD
          git push origin HEAD:production --force-with-lease

      - name: Trigger CI on production branch
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              ref: 'production',
            });

      - name: Write promotion summary
        env:
          SOURCE_REF: ${{ github.event.inputs.source_ref }}
        run: |
          {
            echo "## Production promotion requested"
            echo
            echo "- Source ref: $SOURCE_REF"
            echo "- Target branch: production"
            echo "- CI has been explicitly dispatched on \`production\` and will verify, then trigger Railway production deploy via the CLI workflow."
          } >> "$GITHUB_STEP_SUMMARY"
